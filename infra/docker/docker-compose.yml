services:
  postgres:
    image: postgres:16-alpine
    container_name: onspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: onspace
      POSTGRES_PASSWORD: onspace
      POSTGRES_DB: onspace_crm
    ports:
      - "5432:5432"
    volumes:
      - onspace_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: onspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - onspace_redisdata:/data

volumes:
  onspace_pgdata:
  onspace_redisdata:
