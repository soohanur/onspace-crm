# OnspaceCRM — production stack (self-hosted).
#
# Brings up:
#   postgres        — primary DB on a named volume
#   redis           — BullMQ queue + cache
#   api             — NestJS HTTP + worker (port 4000)
#   web             — Next.js standalone (port 3000)
#   scraper-worker  — same API image, WORKER_ONLY=1, BullMQ-only
#   cloudflared     — Cloudflare Tunnel sidecar; reads $CLOUDFLARE_TUNNEL_TOKEN
#
# Run:
#   cd /path/to/onspaceCRM
#   cp infra/docker/.env.example .env
#   # fill in PUBLIC_WEB_URL, PUBLIC_API_URL, CLOUDFLARE_TUNNEL_TOKEN, etc.
#   docker compose -f infra/docker/docker-compose.prod.yml --env-file .env up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: onspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onspace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onspace}
      POSTGRES_DB: ${POSTGRES_DB:-onspace_crm}
    volumes:
      - onspace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-onspace}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: onspace-redis
    restart: unless-stopped
    volumes:
      - onspace_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: onspace/api:latest
    container_name: onspace-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-onspace}:${POSTGRES_PASSWORD:-onspace}@postgres:5432/${POSTGRES_DB:-onspace_crm}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_TLS: 'false'
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Code reads GOOGLE_OAUTH_REDIRECT_URI (gmail.service.ts / google-calendar.service.ts).
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      # OAuth refresh tokens are encrypted with this key before going into
      # Postgres. Must be set or /email/auth/connect refuses. 32+ bytes.
      EMAIL_TOKEN_ENC_KEY: ${EMAIL_TOKEN_ENC_KEY:-}
      # Used by TunnelService for the tracking pixel hostname; used by
      # the OAuth callback to redirect back to the web app.
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      FRONTEND_URL: ${PUBLIC_WEB_URL}
      # Outreach pacing (see sequences.constants.ts):
      OUTREACH_TZ: ${OUTREACH_TZ:-America/New_York}
      OUTREACH_HOUR_START: ${OUTREACH_HOUR_START:-9}
      OUTREACH_HOUR_END: ${OUTREACH_HOUR_END:-17}
      OUTREACH_GAP_MIN_SEC: ${OUTREACH_GAP_MIN_SEC:-480}
      OUTREACH_GAP_MAX_SEC: ${OUTREACH_GAP_MAX_SEC:-600}
    ports:
      # Bind to loopback only — Tailscale on the host reaches these
      # via 127.0.0.1 then Funnel publishes them. Not exposed to LAN.
      - "127.0.0.1:4000:4000"

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    image: onspace/web:latest
    container_name: onspace-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Bind to all interfaces. Next 15 standalone defaults to
      # os.hostname() which inside Docker is the container ID — and the
      # container can't resolve its own hostname (EAI_AGAIN).
      HOSTNAME: 0.0.0.0
      PORT: '3000'
    ports:
      - "127.0.0.1:3000:3000"

  scraper-worker:
    image: onspace/api:latest
    container_name: onspace-scraper
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      WORKER_ONLY: '1'
      SCRAPER_PYTHON: python3
      TUNNEL_DISABLED: '1'
      DATABASE_URL: postgresql://${POSTGRES_USER:-onspace}:${POSTGRES_PASSWORD:-onspace}@postgres:5432/${POSTGRES_DB:-onspace_crm}?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      # Mirror outreach pacing so a worker-side tick processes the queue
      # under the same office-hours + gap rules as the api container.
      OUTREACH_TZ: ${OUTREACH_TZ:-America/New_York}
      OUTREACH_HOUR_START: ${OUTREACH_HOUR_START:-9}
      OUTREACH_HOUR_END: ${OUTREACH_HOUR_END:-17}
      OUTREACH_GAP_MIN_SEC: ${OUTREACH_GAP_MIN_SEC:-480}
      OUTREACH_GAP_MAX_SEC: ${OUTREACH_GAP_MAX_SEC:-600}
      REDIS_TLS: 'false'
    shm_size: '512m'

# Public ingress is handled by Tailscale Funnel running on the Windows
# host (free, no card required). See infra/docker/DEPLOY.md for the
# `tailscale serve` + `tailscale funnel on` commands. The web + api
# services bind to 127.0.0.1 above so only Tailscale (running on the
# host) can reach them — the LAN can't.

volumes:
  onspace_pgdata:
  onspace_redisdata:

networks:
  default:
    name: onspace-net
